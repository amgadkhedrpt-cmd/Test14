<html lang="ar" dir="rtl">
<head>

<title>BodyFix — Ultimate Payroll & Clinic Dashboard</title>

<style>
:root{
  --bg:#0E1117;--sf:#161B25;--sf2:#1E2535;--bd:#2A3347;
  --acc:#3B82F6;--grn:#10B981;--amb:#F59E0B;--red:#EF4444;--pur:#8B5CF6;--teal:#34D399;
  --tx:#E8EDF5;--tx2:#8899AA;--tx3:#4A5568;
  --font:'IBM Plex Sans Arabic',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--tx);direction:rtl}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--sf)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}

/* Layout Structural Control */
.shell{display:grid;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:14px;height:52px;flex-shrink:0}
.logo{font-size:13px;font-weight:700;letter-spacing:.1em;color:var(--acc);text-transform:uppercase;font-family:var(--mono)}
.logo span{color:var(--tx3)}
.topbar-mid{font-size:11px;color:var(--tx3);font-family:var(--mono)}
.topbar-right{margin-right:auto;display:flex;gap:8px;align-items:center}
.tbtn{background:transparent;border:1px solid var(--bd);border-radius:7px;color:var(--tx2);font-family:var(--font);font-size:12px;padding:5px 13px;cursor:pointer;transition:.15s}
.tbtn:hover{border-color:var(--acc);color:var(--acc)}
.tbtn.primary{background:var(--acc);border-color:var(--acc);color:#fff}
.tbtn.primary:hover{background:#2563EB}

.main{display:grid;grid-template-columns:260px 1fr;overflow:hidden}

/* Sidebar Files Area */
.sidebar{background:var(--sf);border-left:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column}
.sb-sec{padding:16px;border-bottom:1px solid var(--bd)}
.sb-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);font-family:var(--mono);margin-bottom:10px}

.upload-grid { display: flex; flex-direction: column; gap: 2px; }

/* صناديق الرفع المطورة والمحمية للموبايل */
.uz{border:1px dashed var(--bd);border-radius:9px;padding:12px 10px;cursor:pointer;transition:.18s;text-align:center;position:relative;margin-bottom:7px;background:transparent}
.uz:hover{border-color:var(--acc);background:rgba(59,130,246,.04)}
.uz.done{border-color:var(--grn);border-style:solid;background:rgba(16,185,129,.04)}
.uz input[type="file"]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:99}
.uz-icon{font-size:16px;margin-bottom:2px}
.uz-name{font-size:11px;font-weight:500;color:var(--tx2)}
.uz.done .uz-name{color:var(--grn);font-weight:600}
.uz-file{font-size:10px;color:var(--tx3);font-family:var(--mono);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.run-btn{width:100%;padding:11px;border-radius:9px;border:none;background:var(--acc);color:#fff;font-family:var(--font);font-weight:600;font-size:13px;cursor:pointer;transition:.18s;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px}
.run-btn:hover:not(:disabled){background:#2563EB}
.run-btn:disabled{background:var(--bd);color:var(--tx3);cursor:not-allowed}
.err{background:rgba(239, 68, 68, 0.12);border:1px solid rgba(239,68,68,.25);border-radius:7px;padding:12px;font-size:12px;color:#FCA5A5;line-height:1.6;margin-top:8px;white-space:pre-line}

.nav{display:flex;flex-direction:column}
.ni{display:flex;align-items:center;gap:9px;padding:10px 16px;cursor:pointer;transition:.12s;font-size:13px;color:var(--tx2);border-right:2px solid transparent}
.ni:hover{background:rgba(255,255,255,.02);color:var(--tx)}
.ni.on{background:rgba(59,130,246,.08);color:var(--acc);border-right-color:var(--acc)}
.ni-ic{font-size:14px;width:18px;text-align:center}
.sc{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--sf2);border-radius:7px;margin-bottom:5px}
.sc-l{font-size:11px;color:var(--tx2)}.sc-v{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--tx)}

/* Content */
.content{overflow-y:auto;padding:24px}
.pg{display:none}.pg.on{display:block}

/* KPIs & Tables Row Styling */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:13px;padding:18px 20px;position:relative;overflow:hidden}

.kv{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--tx);margin-bottom:3px}
.kl{font-size:12px;color:var(--tx2)}
